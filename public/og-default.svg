    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect x="70" y="70" width="1060" height="490" rx="28" fill="#0f1728" stroke="#2b415f" stroke-width="4"/>
  <circle cx="125" cy="124" r="10" fill="#ff7d7d"/>
